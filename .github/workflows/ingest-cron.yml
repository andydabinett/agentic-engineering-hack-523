# Optional: scheduled ingest on GitHub Actions (secrets required).
# For production, prefer Railway cron or manual ingest from the UI.
name: Scheduled ingest

on:
  schedule:
    - cron: "0 14,20 * * *" # 10am & 4pm ET (approx) — adjust as needed
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Ingest + sync ClickHouse
        env:
          NIMBLE_API_KEY: ${{ secrets.NIMBLE_API_KEY }}
          CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_API_KEY: ${{ secrets.CLICKHOUSE_API_KEY }}
          CLICKHOUSE_PORT: ${{ secrets.CLICKHOUSE_PORT || '8443' }}
          CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER || 'default' }}
          CLICKHOUSE_DATABASE: ${{ secrets.CLICKHOUSE_DATABASE || 'default' }}
          CLICKHOUSE_SECURE: ${{ secrets.CLICKHOUSE_SECURE || 'true' }}
        run: |
          node scripts/ingest-boroughs.js --boroughs all --max-results 5 --no-playwright
          node scripts/sync-clickhouse.js
